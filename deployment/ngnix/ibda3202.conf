# ============================================================
#  Nginx — IBDA3202 Secure Store (Blue Team Monitoring)
#  Port: 8080 (HTTP)
#  Backend: Gunicorn 127.0.0.1:5001
#
#  File: /etc/nginx/sites-available/ibda3202-secure.conf
# ============================================================

# Rate limiting zone — digunakan di blok server
# Batasi 20 req/detik per IP, burst 50 req
limit_req_zone  $binary_remote_addr zone=ibda3202_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=ibda3202_conn:10m;

server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    # ── Logging ─────────────────────────────────────────
    access_log /var/log/nginx/ibda3202-secure-access.log combined;
    error_log  /var/log/nginx/ibda3202-secure-error.log  warn;

    # ── Direktori root ───────────────────────────────────
    root /var/www/ibda3202-secure;

    # ── Batas ukuran upload (sama dengan app: 2MB) ────────
    client_max_body_size 2M;
    client_body_timeout  20s;
    client_header_timeout 20s;

    # ── Rate limiting global ──────────────────────────────
    limit_req  zone=ibda3202_limit burst=50 nodelay;
    limit_conn ibda3202_conn 20;

    # ══════════════════════════════════════════════════════
    #  SECURITY HEADERS LENGKAP
    # ══════════════════════════════════════════════════════
    add_header X-Frame-Options           "DENY"                  always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"
        always;

    # Sembunyikan versi Nginx
    server_tokens off;

    # ══════════════════════════════════════════════════════
    #  PROTEKSI FILE — Blokir akses ke semua file sensitif
    # ══════════════════════════════════════════════════════

    # [KRITIS] Blokir file Python, database, log, config, env, key
    location ~* \.(py|pyc|pyo|db|sqlite|sqlite3|log|env|cfg|ini|conf|bak|sql|sh|bash|key|pem|crt|p12|pfx)$ {
        deny all;
        return 404;
    }

    # [KRITIS] Blokir akses ke file dan folder tersembunyi
    # Mencegah akses ke .git, .env, .htaccess, .DS_Store, dll.
    location ~ /\. {
        deny all;
        return 404;
    }

    # [KRITIS] Blokir path traversal (../, %2e%2e, dll.)
    location ~* (\.\./) {
        deny all;
        return 400;
    }

    # Blokir URL encoding berbahaya
    if ($request_uri ~* "%2e%2e|%252e|%c0%af|%e0%80%af") {
        return 400;
    }

    # Blokir akses langsung ke folder sistem
    location ~* ^/(venv|__pycache__|\.git|\.github|node_modules|tests?)/ {
        deny all;
        return 404;
    }

    # Blokir akses ke requirements.txt, README, Makefile, dll.
    location ~* ^/(requirements|README|Makefile|Dockerfile|docker-compose|\.env\.example)(\..+)?$ {
        deny all;
        return 404;
    }

    # ── Blokir HTTP method berbahaya ─────────────────────
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # ── Rate limit ketat pada endpoint auth ──────────────
    location ~ ^/(login|register)$ {
        limit_req zone=ibda3202_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files ─────────────────────────────────────
    location /static/ {
        alias /var/www/ibda3202-secure/static/;
        autoindex off;   # [KRITIS] Matikan directory listing!

        # Hanya izinkan ekstensi aman
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Upload folder — akses dengan proteksi ketat
        location /static/uploads/ {
            alias /var/www/ibda3202-secure/static/uploads/;
            autoindex off;

            # [KRITIS] BLOKIR TOTAL eksekusi script apapun di uploads
            location ~* \.(php|php\d?|phtml|phar|asp|aspx|jsp|sh|bash|py|pl|rb|cgi|exe|bat|cmd|ps1)$ {
                deny all;
                return 404;
            }

            # Hanya izinkan gambar
            location ~* \.(png|jpg|jpeg|gif|webp)$ {
                add_header Content-Disposition "attachment";  # Force download, tidak dirender
                add_header X-Content-Type-Options "nosniff" always;
            }

            # Blokir semua yang bukan gambar
            location ~* [^.(png|jpg|jpeg|gif|webp)]$ {
                deny all;
                return 404;
            }
        }

        # Blokir semua file selain yang diizinkan di atas
        location ~* \.(py|pyc|db|sqlite|log|env|conf|sh|php|asp|jsp)$ {
            deny all;
            return 404;
        }
    }

    # ── Proxy ke Gunicorn ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Hapus header yang bocorkan info server
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;

        proxy_connect_timeout 15s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Error pages ───────────────────────────────────────
    error_page 400 /400;
    error_page 403 /403;
    error_page 404 /404;
    error_page 429 /429;
    error_page 500 502 503 504 /500;

    location ~ ^/(400|403|404|429|500)$ {
        proxy_pass http://127.0.0.1:5001;
        internal;
    }
}
